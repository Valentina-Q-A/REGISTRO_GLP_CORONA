<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Tubo 1 -->
  <rect x="40" y="60" width="30" height="100" fill="#777" stroke="#333" stroke-width="2" rx="5"/>
  <rect x="45" y="65" width="20" height="90" fill="url(#grad1)"/>
  
  <!-- Tubo 2 -->
  <rect x="85" y="60" width="30" height="100" fill="#777" stroke="#333" stroke-width="2" rx="5"/>
  <rect x="90" y="65" width="20" height="90" fill="url(#grad1)"/>
  
  <!-- Tubo 3 -->
  <rect x="130" y="60" width="30" height="100" fill="#777" stroke="#333" stroke-width="2" rx="5"/>
  <rect x="135" y="65" width="20" height="90" fill="url(#grad1)"/>
  
  <!-- Vapor -->
  <ellipse cx="55" cy="45" rx="10" ry="8" fill="#B0C4DE" opacity="0.6"/>
  <ellipse cx="100" cy="40" rx="12" ry="10" fill="#B0C4DE" opacity="0.5"/>
  <ellipse cx="145" cy="48" rx="10" ry="8" fill="#B0C4DE" opacity="0.6"/>
  
  <!-- Válvulas superiores -->
  <rect x="50" y="55" width="10" height="8" fill="#555" stroke="#333" stroke-width="1"/>
  <rect x="95" y="55" width="10" height="8" fill="#555" stroke="#333" stroke-width="1"/>
  <rect x="140" y="55" width="10" height="8" fill="#555" stroke="#333" stroke-width="1"/>
  
  <!-- Base -->
  <rect x="30" y="160" width="140" height="15" fill="#555" stroke="#333" stroke-width="2" rx="3"/>
  
  <!-- Gradiente de calor -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- Etiqueta -->
  <text x="100" y="190" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">VAPORIZADOR</text>
</svg>
