<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Tubería de entrada -->
  <rect x="10" y="85" width="50" height="30" fill="#888" stroke="#333" stroke-width="2"/>
  
  <!-- Cuerpo de la bomba -->
  <circle cx="100" cy="100" r="50" fill="#666" stroke="#333" stroke-width="3"/>
  <circle cx="100" cy="100" r="40" fill="#888" stroke="#333" stroke-width="2"/>
  
  <!-- Impulsor -->
  <circle cx="100" cy="100" r="30" fill="#4A90E2" opacity="0.5"/>
  
  <!-- Aspas del impulsor -->
  <line x1="100" y1="70" x2="100" y2="130" stroke="#333" stroke-width="3"/>
  <line x1="70" y1="100" x2="130" y2="100" stroke="#333" stroke-width="3"/>
  <line x1="80" y1="80" x2="120" y2="120" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="80" x2="80" y2="120" stroke="#333" stroke-width="2"/>
  
  <!-- Centro -->
  <circle cx="100" cy="100" r="8" fill="#333"/>
  
  <!-- Tubería de salida -->
  <rect x="140" y="85" width="50" height="30" fill="#888" stroke="#333" stroke-width="2"/>
  
  <!-- Motor -->
  <rect x="120" y="60" width="40" height="50" fill="#FFD166" stroke="#333" stroke-width="2" rx="5"/>
  <text x="140" y="90" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">M</text>
  
  <!-- Base -->
  <rect x="50" y="155" width="100" height="10" fill="#555" stroke="#333" stroke-width="2"/>
  <rect x="70" y="165" width="5" height="10" fill="#444"/>
  <rect x="125" y="165" width="5" height="10" fill="#444"/>
</svg>
