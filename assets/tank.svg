<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Tanque horizontal -->
  <ellipse cx="100" cy="100" rx="80" ry="50" fill="#ddd" stroke="#333" stroke-width="3"/>
  
  <!-- Sombra interior -->
  <ellipse cx="100" cy="100" rx="70" ry="40" fill="#fff" opacity="0.3"/>
  
  <!-- Nivel de líquido -->
  <ellipse cx="100" cy="120" rx="60" ry="30" fill="#4A90E2" opacity="0.7"/>
  
  <!-- Líneas de refuerzo -->
  <line x1="50" y1="50" x2="50" y2="150" stroke="#666" stroke-width="2"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#666" stroke-width="2"/>
  <line x1="150" y1="50" x2="150" y2="150" stroke="#666" stroke-width="2"/>
  
  <!-- Válvula superior -->
  <rect x="95" y="40" width="10" height="15" fill="#666" stroke="#333" stroke-width="1"/>
  
  <!-- Válvula inferior -->
  <rect x="95" y="145" width="10" height="15" fill="#666" stroke="#333" stroke-width="1"/>
  
  <!-- Base de soporte -->
  <rect x="30" y="155" width="140" height="8" fill="#666" stroke="#333" stroke-width="2"/>
  <rect x="40" y="163" width="3" height="12" fill="#444"/>
  <rect x="157" y="163" width="3" height="12" fill="#444"/>
</svg>
