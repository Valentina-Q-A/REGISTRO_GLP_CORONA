<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Histórico GLP</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f4f4f4;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#222;
color:white;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Histórico Planta GLP</h1>

<input type="date" id="fecha">
<button onclick="buscar()">Buscar</button>
<button onclick="cargarHistorico()">Reset</button>
<button onclick="exportar()">Exportar Excel</button>


<table>
<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>NivelTanque</th>
<th>PresionTanque</th>
<th>TempTanque</th>
<th>NivelCisterna</th>
<th>CapacidadCisterna</th>
<th>PlacaCisterna</th>
<th>PresionBomba</th>
<th>TempVapor</th>
<th>PresionVapor</th>
<th>PresionMezcla</th>
<th>Observaciones</th>
<th>Encargado</th>
<th>FechaServidor</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

// ============================================
// CONFIG
// ============================================

const TOKEN = "BBUS-9TxsD2zFJdsZHGHnhVbtafa8LU37rA"

const VARIABLES = {
    nivel_tanque: "69b9845f00fab5d8ef22b54d",
    presion_tanque: "69b9846000fab5d8ef22b54e",
    temp_tanque: "69b984613609a6ccc5146aa2",
    nivel_cisterna: "69b9845f00fab5d8ef22b54c",
    capacidad_cisterna: "69b9845f3609a6ccc5146aa1",
    presion_bomba: "69b984609ae1225920346415",
    temp_vapor: "69b9846100fab5d8ef22b54f",
    presion_vapor: "69b984603384289118c238ca",
    presion_mezcla: "69b98460f0f71673e8da7976"
}

// 👉 almacenamiento global
let DATA_GLOBAL = []

// ============================================
// TRAER DATOS
// ============================================

async function getData(variableId){

let url = `https://industrial.api.ubidots.com/api/v1.6/variables/${variableId}/values?page_size=100`
let all = []

while(url){

const res = await fetch(url,{
headers:{ "X-Auth-Token":TOKEN }
})

const data = await res.json()

if(data.results){
all = all.concat(data.results)
}

url = data.next

}

return all

}

// ============================================
// CARGAR HISTÓRICO
// ============================================

async function cargarHistorico(){

const keys = Object.keys(VARIABLES)
const dataset = {}

for(let key of keys){
dataset[key] = await getData(VARIABLES[key])
}

// ============================================
// MERGE POR TIMESTAMP (MEJORADO)
// ============================================

let registros = {}

keys.forEach(key=>{
dataset[key].forEach(r=>{

const t = r.timestamp

if(!registros[t]){
registros[t] = {
timestamp: t,
context: {}
}
}

// 🔥 fusionar contextos correctamente
registros[t].context = {
...registros[t].context,
...(r.context || {})
}

registros[t][key] = r.value

})
})

// convertir a array
let final = Object.values(registros)

// ordenar correctamente
final.sort((a,b)=> b.timestamp - a.timestamp)

// guardar global
DATA_GLOBAL = final

renderTabla(final)

}

// ============================================
// RENDER
// ============================================

function renderTabla(data){

const tabla = document.getElementById("tabla")
tabla.innerHTML = ""

data.forEach(r=>{

const ctx = r.context || {}

tabla.innerHTML += `
<tr>
<td>${ctx.Fecha || ""}</td>
<td>${ctx.Hora || ""}</td>
<td>${r.nivel_tanque || ""}</td>
<td>${r.presion_tanque || ""}</td>
<td>${r.temp_tanque || ""}</td>
<td>${r.nivel_cisterna || ""}</td>
<td>${r.capacidad_cisterna || ""}</td>
<td>${ctx.PlacaCisterna || ""}</td>
<td>${r.presion_bomba || ""}</td>
<td>${r.temp_vapor || ""}</td>
<td>${r.presion_vapor || ""}</td>
<td>${r.presion_mezcla || ""}</td>
<td>${ctx.Observaciones || ""}</td>
<td>${ctx.Encargado || ""}</td>
<td>${new Date(r.timestamp).toLocaleString()}</td>
</tr>
`
})

}

// ============================================
// BUSCAR (CORREGIDO)
// ============================================

function buscar(){

const fecha = document.getElementById("fecha").value

if(!fecha){
renderTabla(DATA_GLOBAL)
return
}

// 🔥 filtrar sobre datos ya cargados
const filtrados = DATA_GLOBAL.filter(r=>{
const ctx = r.context || {}
return ctx.Fecha === fecha
})

// ordenar
filtrados.sort((a,b)=> b.timestamp - a.timestamp)

renderTabla(filtrados)

}

// ============================================
// EXPORTAR
// ============================================

function exportar(){

let tabla = document.getElementById("tabla").outerHTML

let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(tabla)

let link = document.createElement("a")
link.href = url
link.download = "historico_glp.xls"
link.click()

}

// ============================================
// INIT
// ============================================

window.onload = cargarHistorico

</script>

</body>
</html>
