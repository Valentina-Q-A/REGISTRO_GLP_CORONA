<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Histórico GLP</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f4f4f4;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#222;
color:white;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Histórico Planta GLP</h1>

<input type="date" id="fecha">
<button onclick="buscar()">Buscar</button>
<button onclick="exportar()">Exportar Excel</button>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>NivelTanque</th>
<th>PresionTanque</th>
<th>TempTanque</th>
<th>NivelCisterna</th>
<th>CapacidadCisterna</th>
<th>PlacaCisterna</th>
<th>PresionBomba</th>
<th>TempVapor</th>
<th>PresionVapor</th>
<th>PresionMezcla</th>
<th>Observaciones</th>
<th>Encargado</th>
<th>FechaServidor</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

// ============================================
// CONFIG
// ============================================

const TOKEN = "BBUS-9TxsD2zFJdsZHGHnhVbtafa8LU37rA"
const VARIABLE = "69b833f69262f7bf99220dce"

// ============================================
// CARGAR TODO EL HISTÓRICO (PAGINADO)
// ============================================

async function cargarHistorico(){

let url = `https://industrial.api.ubidots.com/api/v1.6/variables/${VARIABLE}/values?page_size=100`
let allData = []

while(url){

const res = await fetch(url,{
headers:{
"X-Auth-Token":TOKEN
}
})

const data = await res.json()

if(data.results){
allData = allData.concat(data.results)
}

url = data.next // siguiente página

}

// ordenar por fecha descendente
allData.sort((a,b)=> b.timestamp - a.timestamp)

renderTabla(allData)

}

// ============================================
// RENDER TABLA
// ============================================

function renderTabla(data){

const tabla = document.getElementById("tabla")
tabla.innerHTML = ""

data.forEach(r=>{

const ctx = r.context || {}

tabla.innerHTML += `
<tr>
<td>${ctx.Fecha || ""}</td>
<td>${ctx.Hora || ""}</td>
<td>${r.value || ""}</td>
<td>${ctx.PresionTanque || ""}</td>
<td>${ctx.TempTanque || ""}</td>
<td>${ctx.NivelCisterna || ""}</td>
<td>${ctx.CapacidadCisterna || ""}</td>
<td>${ctx.PlacaCisterna || ""}</td>
<td>${ctx.PresionBomba || ""}</td>
<td>${ctx.TempVapor || ""}</td>
<td>${ctx.PresionVapor || ""}</td>
<td>${ctx.PresionMezcla || ""}</td>
<td>${ctx.Observaciones || ""}</td>
<td>${ctx.Encargado || ""}</td>
<td>${new Date(r.timestamp).toLocaleString()}</td>
</tr>
`
})

}

// ============================================
// BUSCAR POR FECHA (FILTRO LOCAL)
// ============================================

async function buscar(){

const fecha = document.getElementById("fecha").value

let url = `https://industrial.api.ubidots.com/api/v1.6/variables/${VARIABLE}/values?page_size=100`
let allData = []

while(url){

const res = await fetch(url,{
headers:{
"X-Auth-Token":TOKEN
}
})

const data = await res.json()

if(data.results){
allData = allData.concat(data.results)
}

url = data.next

}

// filtrar por fecha
const filtrados = allData.filter(r=>{
const ctx = r.context || {}
return !fecha || ctx.Fecha === fecha
})

// ordenar
filtrados.sort((a,b)=> b.timestamp - a.timestamp)

renderTabla(filtrados)

}

// ============================================
// EXPORTAR A EXCEL
// ============================================

function exportar(){

let tabla = document.getElementById("tabla").outerHTML

let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(tabla)

let link = document.createElement("a")
link.href = url
link.download = "historico_glp.xls"
link.click()

}

// ============================================
// AUTOLOAD
// ============================================

window.onload = cargarHistorico

</script>

</body>
</html>
