<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Histórico GLP</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f4f4f4;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#222;
color:white;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Histórico Planta GLP</h1>

<input type="date" id="fecha">
<button onclick="buscar()">Buscar</button>
<button onclick="cargarHistorico()">Reset</button>
<button onclick="exportar()">Exportar Excel</button>


<table>
<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>NivelTanque</th>
<th>PresionTanque</th>
<th>TempTanque</th>
<th>NivelCisterna</th>
<th>CapacidadCisterna</th>
<th>PlacaCisterna</th>
<th>PresionBomba</th>
<th>TempVapor</th>
<th>PresionVapor</th>
<th>PresionMezcla</th>
<th>Observaciones</th>
<th>Encargado</th>
<th>FechaServidor</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

// ============================================
// CONFIG
// ============================================

const TOKEN = "BBUS-etSh1XzuTj9VZAJIuZLswp9CPxFBTM"

const VARIABLES = {
    nivel_tanque: "69c2a59bbd8a77f94450fead",
    presion_tanque: "69c2a5eaeeda414824da91f1",
    temp_tanque: "69c2a6179c18013ea16383e5",
    nivel_cisterna: "69c2a62f45c5fcfe4bad3384",
    capacidad_cisterna: "69c2a647bd8a77f94450feb1",
    presion_bomba: "69c2a66053a41a747f3a2129",
    temp_vapor: "69c2a6779933011f71ff918d",
    presion_vapor: "69c2a68c9933011f71ff918e",
    presion_mezcla: "69c2a6a3cfe705dda9e03c76"
}

// 👉 almacenamiento global
let DATA_GLOBAL = []

// ============================================
// TRAER DATOS
// ============================================

async function getData(variableId){

let url = `https://industrial.api.ubidots.com/api/v1.6/variables/${variableId}/values?page_size=100`
let all = []

while(url){

const res = await fetch(url,{
headers:{ "X-Auth-Token":TOKEN }
})

const data = await res.json()

if(data.results){
all = all.concat(data.results)
}

url = data.next

}

return all

}

// ============================================
// CARGAR HISTÓRICO
// ============================================

async function cargarHistorico(){

const keys = Object.keys(VARIABLES)
const dataset = {}

for(let key of keys){
dataset[key] = await getData(VARIABLES[key])
}

// ============================================
// MERGE POR TIMESTAMP (MEJORADO)
// ============================================

let registros = {}

keys.forEach(key=>{
dataset[key].forEach(r=>{

const t = r.timestamp

if(!registros[t]){
registros[t] = {
timestamp: t,
context: {}
}
}

// 🔥 fusionar contextos correctamente
registros[t].context = {
...registros[t].context,
...(r.context || {})
}

registros[t][key] = r.value

})
})

// convertir a array
let final = Object.values(registros)

// ordenar correctamente
final.sort((a,b)=> b.timestamp - a.timestamp)

// guardar global
DATA_GLOBAL = final

renderTabla(final)

}

// ============================================
// RENDER
// ============================================

function renderTabla(data){

const tabla = document.getElementById("tabla")
tabla.innerHTML = ""

data.forEach(r=>{

const ctx = r.context || {}

tabla.innerHTML += `
<tr>
<td>${ctx.Fecha || ""}</td>
<td>${ctx.Hora || ""}</td>
<td>${r.nivel_tanque || ""}</td>
<td>${r.presion_tanque || ""}</td>
<td>${r.temp_tanque || ""}</td>
<td>${r.nivel_cisterna || ""}</td>
<td>${r.capacidad_cisterna}</td>
<td>${ctx.PlacaCisterna || ""}</td>
<td>${r.presion_bomba || ""}</td>
<td>${r.temp_vapor || ""}</td>
<td>${r.presion_vapor || ""}</td>
<td>${r.presion_mezcla || ""}</td>
<td>${ctx.Observaciones || ""}</td>
<td>${ctx.Encargado || ""}</td>
<td>${new Date(r.timestamp).toLocaleString()}</td>
</tr>
`
})

}

// ============================================
// BUSCAR (CORREGIDO)
// ============================================

function buscar(){

const fecha = document.getElementById("fecha").value

if(!fecha){
renderTabla(DATA_GLOBAL)
return
}

// 🔥 filtrar sobre datos ya cargados
const filtrados = DATA_GLOBAL.filter(r=>{
const ctx = r.context || {}
return ctx.Fecha === fecha
})

// ordenar
filtrados.sort((a,b)=> b.timestamp - a.timestamp)

renderTabla(filtrados)

}

// ============================================
// EXPORTAR
// ============================================

function exportar(){

let filas = []

// encabezados
filas.push([
"Fecha","Hora","NivelTanque","PresionTanque","TempTanque",
"NivelCisterna","CapacidadCisterna","PlacaCisterna",
"PresionBomba","TempVapor","PresionVapor","PresionMezcla",
"Observaciones","Encargado","FechaServidor"
])

// recorrer datos
DATA_GLOBAL.forEach(r=>{

const ctx = r.context || {}

filas.push([
ctx.Fecha || "",
ctx.Hora || "",
r.nivel_tanque ?? "",
r.presion_tanque ?? "",
r.temp_tanque ?? "",
r.nivel_cisterna ?? "",
r.capacidad_cisterna,
ctx.PlacaCisterna || "",
r.presion_bomba ?? "",
r.temp_vapor ?? "",
r.presion_vapor ?? "",
r.presion_mezcla ?? "",
ctx.Observaciones || "",
ctx.Encargado || "",
new Date(r.timestamp).toLocaleString()
])

})

// convertir a texto tipo Excel (CSV con tabulación)
let contenido = filas.map(f => f.join("\t")).join("\n")

// crear archivo
let blob = new Blob([contenido], { type: "application/vnd.ms-excel" })

let link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = "historico_glp.xls"
link.click()

}

// ============================================
// INIT
// ============================================

window.onload = cargarHistorico

</script>

</body>
</html>
